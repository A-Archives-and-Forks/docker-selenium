apiVersion: apps/v1
kind: Deployment
metadata:
  name: the-internet
  labels:
    app: the-internet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: the-internet
  template:
    metadata:
      labels:
        app: the-internet
    spec:
      containers:
      - name: the-internet
        image: ndviet/the-internet:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: the-internet
  labels:
    app: the-internet
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: the-internet

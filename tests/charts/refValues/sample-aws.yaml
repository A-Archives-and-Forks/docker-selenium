# README: This is a sample values for chart deployment in EKS AWS
# Chart dependency traefik is installed together by enabling `traefik.enabled`. On AWS, Traefik is installed as a LoadBalancer
# Chart dependency keda is installed together by enabling `autoscaling.enable`
# Enabled ingress with hostname, set the subPath `/selenium`. Grid is accessible via http://my.hostname/selenium
# Use this reference values to deploy e.g. `helm upgrade --install test --values tests/charts/refValues/sample-aws.yaml docker-selenium/selenium-grid --version <0.26.3_onwards>`
global:
  K8S_PUBLIC_IP: ""
  seleniumGrid:
    logLevel: INFO # Change to FINE when you want to debug the issue

ingress:
  enabled: true
  className: traefik
  hostname: "aws.ndviet.org" # Replace with your hostname

basicAuth:
  enabled: false

isolateComponents: true

autoscaling:
  enabled: true
  scalingType: job
  annotations:
    helm.sh/hook: post-install,post-upgrade,post-rollback
  scaledOptions:
    minReplicaCount: 0
    maxReplicaCount: 8
    pollingInterval: 15
  scaledJobOptions:
    successfulJobsHistoryLimit: 0
    failedJobsHistoryLimit: 5
    scalingStrategy:
      strategy: default

hub:
  subPath: /selenium

components:
  router:
    subPath: /selenium

chromeNode:
  nodeEnableManagedDownloads: &remoteDownload true
  extraEnvironmentVariables: &extraEnvironmentVariablesNodes
    - name: SE_NODE_SESSION_TIMEOUT
      value: "300"
    - name: SE_VNC_NO_PASSWORD
      value: "true"

firefoxNode:
  nodeEnableManagedDownloads: *remoteDownload
  extraEnvironmentVariables: *extraEnvironmentVariablesNodes

edgeNode:
  nodeEnableManagedDownloads: *remoteDownload
  extraEnvironmentVariables: *extraEnvironmentVariablesNodes

videoRecorder:
  enabled: false

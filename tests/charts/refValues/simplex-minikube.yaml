# README: This is a sample values for chart deployment in Minikube
# Chart dependency traefik is installed together by enabling `traefik.enabled`
# Chart dependency keda is installed together by enabling `autoscaling.enable`
# Enabled ingress without hostname, set the subPath `/selenium`. Set K8S_PUBLIC_IP point to the public host IP, where Minikube is running
# `traefik.ports.*.hostPort` is set to expose ports directly on the host for access via http://<K8S_PUBLIC_IP>/selenium
# Components serviceType is set to NodePort to allow access from outside the cluster via K8S_PUBLIC_IP and NodePort http://<K8S_PUBLIC_IP>:30444/selenium
# Use this reference values to deploy e.g. `helm upgrade --install test --values tests/charts/refValues/simplex-minikube.yaml docker-selenium/selenium-grid --version <0.26.3_onwards>`
global:
  seleniumGrid:
    logLevel: INFO

tls:
  ingress:
    enabled: true

ingress:
  enableWithController: true
  className: traefik
  hostname: ""

basicAuth:
  enabled: false

isolateComponents: true

autoscaling:
  enabled: true
  scalingType: job
  scaledOptions:
    minReplicaCount: 0
    maxReplicaCount: 8
    pollingInterval: 15
  scaledJobOptions:
    successfulJobsHistoryLimit: 0
    failedJobsHistoryLimit: 5
    scalingStrategy:
      strategy: default

hub:
  subPath: /selenium
  serviceType: NodePort

components:
  router:
    subPath: /selenium
    serviceType: NodePort

chromeNode:
  extraEnvironmentVariables: &extraEnvironmentVariablesNodes
    - name: SE_VNC_NO_PASSWORD
      value: "true"

firefoxNode:
  extraEnvironmentVariables: *extraEnvironmentVariablesNodes

edgeNode:
  extraEnvironmentVariables: *extraEnvironmentVariablesNodes

videoRecorder:
  enabled: false

traefik:
  ingressClass:
    name: traefik
  deployment:
    kind: DaemonSet
  ports:
    web:
      hostPort: 80
    websecure:
      hostPort: 443
  service:
    type: LoadBalancer
